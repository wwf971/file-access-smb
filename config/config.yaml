# this file contains example config data
auth:
  users:
    - username: example_rw
      password: example_password
      permission: RW
      zip_encryption_key: example_zip_key
      zip_timeout: 60 # unit: second
    - username: example_r
      password: example_read_password
      permission: R

config_databases:
  local:
    ip: 127.0.0.1
    port: 5432
    database_name: postgres
    username: postgres
    password: postgres

file_access_points:
  nas:
    host: 192.168.0.7
    username: example_username
    password: example_password
    share: /example_share